databases:
  - name: salespulse-db
    region: oregon
    plan: basic-256mb
    databaseName: salespulse
    user: salespulse_user

services:
  - type: web
    runtime: node
    name: sales-call-review-dashboard
    repo: https://github.com/accounting-qs/sales-call-review-dashboard
    region: oregon
    plan: starter
    branch: main
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: salespulse-db
          property: connectionString
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
      - key: FIREFLIES_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLICKUP_API_KEY
        sync: false
      - key: CLICKUP_WORKSPACE_ID
        sync: false
      - key: CLICKUP_CHANNEL_ID
        sync: false
      - key: CLOUDFLARE_R2_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_BUCKET_NAME
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: salespulse-sync-cron
    runtime: node
    repo: https://github.com/accounting-qs/sales-call-review-dashboard
    region: oregon
    plan: starter
    branch: main
    schedule: "0 8 * * *"
    buildCommand: "echo 'no build needed'"
    startCommand: |
      node -e "
        const https = require('https');
        const secret = process.env.CRON_SECRET || 'salespulse_daily_sync_key_123';
        const url = 'https://sales-call-review-dashboard.onrender.com/api/cron/sync?force=true';
        const req = https.get(url, { headers: { 'Authorization': 'Bearer ' + secret } }, (res) => {
          let data = '';
          res.on('data', (c) => data += c);
          res.on('end', () => { console.log('Status:', res.statusCode, data); process.exit(0); });
        });
        req.on('error', (e) => { console.error('Error:', e.message); process.exit(1); });
      "
    envVars:
      - key: CRON_SECRET
        sync: false
